name: Gravitile
options:
  bundleIdPrefix: com.flutterly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  GravitileKit:
    path: GravitileKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 9
    MARKETING_VERSION: "1.1"
targets:
  Gravitile:
    type: application
    platform: iOS
    sources: [Gravitile]
    dependencies:
      - package: GravitileKit
      - target: GravitileWatch
    entitlements:
      path: Gravitile/Gravitile.entitlements
      properties:
        com.apple.developer.game-center: true
    info:
      path: Gravitile/Info.plist
      properties:
        CFBundleDisplayName: Gravitile
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        # actool doesn't inject this into hand-authored plists; without it
        # submission fails validation (ITMS-90713 Invalid Binary).
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: LaunchBackground
        # iPhone locks portrait; iPad supports every orientation and
        # resizable windows (required for new apps on the iOS 26 SDK).
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts: [Unbounded.ttf]
        ITSAppUsesNonExemptEncryption: false
        UIStatusBarStyle: UIStatusBarStyleLightContent
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flutterly.gravitile
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
  GravitileWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - GravitileWatch
      # Shared design tokens — SwiftUI-only, no UIKit, safe on watchOS.
      - Gravitile/App/Theme.swift
    dependencies:
      - package: GravitileKit
    info:
      path: GravitileWatch/Info.plist
      properties:
        CFBundleDisplayName: Gravitile
        # Embedded watch app versions must match the iOS app exactly, and
        # hand-authored plists don't get CFBundleIconName injected by actool
        # (the ITMS-90713 lesson from v1.0).
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleIconName: AppIcon
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.flutterly.gravitile
        WKRunsIndependentlyOfCompanionApp: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flutterly.gravitile.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  GravitileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GravitileTests
      - path: Gravitile/Gravitile.storekit
        buildPhase: resources
    dependencies:
      - target: Gravitile
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Gravitile.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Gravitile"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES
  GravitileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [GravitileUITests]
    dependencies:
      - target: Gravitile
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  GravitileWatch:
    build:
      targets:
        GravitileWatch: all
    run:
      config: Debug
  Gravitile:
    build:
      targets:
        Gravitile: all
    run:
      config: Debug
      storeKitConfiguration: Gravitile/Gravitile.storekit
    test:
      config: Debug
      storeKitConfiguration: Gravitile/Gravitile.storekit
      targets:
        - GravitileTests
        - GravitileUITests
